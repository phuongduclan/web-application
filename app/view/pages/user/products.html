<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fashion Store - Products</title>

  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="../../assets/css/user.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="container header-inner">
      <div class="logo">FASHION</div>

      <nav class="nav">
        <a href="../../index.html">Home</a>
        <a href="./products.html">Shop</a>
        <a href="#">Product</a>
        <a href="#">Contact</a>
      </nav>

      <div class="header-actions">
        <span>🔍</span>
        <span>🛒</span>
        <span>👤</span>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main">
    <section class="product-page">
      <div class="container">

        <div class="section-header">
          <h2>All Products</h2>
          <p>Browse our latest fashion items</p>
        </div>

        <div class="product-grid">
          <div class="product-card">
            <img src="../../assets/images/products/product-1.jpg" alt="Basic T-Shirt">
            <h3>Basic T-Shirt</h3>
            <p class="price">$25.00</p>
            <button class="btn">View Detail</button>
          </div>

          <div class="product-card">
            <img src="../../assets/images/products/product-2.jpg" alt="Casual Hoodie">
            <h3>Casual Hoodie</h3>
            <p class="price">$35.00</p>
            <button class="btn">View Detail</button>
          </div>

          <div class="product-card">
            <img src="../../assets/images/products/product-3.jpg" alt="Classic Jeans">
            <h3>Classic Jeans</h3>
            <p class="price">$40.00</p>
            <button class="btn">View Detail</button>
          </div>

          <div class="product-card">
            <img src="../../assets/images/products/product-4.jpg" alt="Denim Jacket">
            <h3>Denim Jacket</h3>
            <p class="price">$45.00</p>
            <button class="btn">View Detail</button>
          </div>
        </div>

      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <p>© 2026 Fashion Store</p>
    </div>
  </footer>

  <script src="../../assets/js/main.js"></script>
</body>
</html>
