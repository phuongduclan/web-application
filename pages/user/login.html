<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Fashion Store</title>

    <link rel="stylesheet" href="../../assets/css/base.css" />
    <link rel="stylesheet" href="../../assets/css/style.css" />
    <link rel="stylesheet" href="../../assets/css/user.css" />
  </head>
  <body class="login-page">
    <!-- HEADER -->
    <header class="header">
      <div class="container header-inner">
        <div class="logo">
          <a href="../../index.html">
            <img src="../../assets/images/logo.png" alt="Selina Logo" />
          </a>
        </div>
        <nav class="nav">
          <a href="../../index.html">Home</a>
          <a href="./products.html">Shop</a>
          <a href="#">Contact</a>
        </nav>

        <div class="header-icons">
          <a href="./login.html" class="active">Login</a>
        </div>
      </div>
    </header>

    <!-- LOGIN -->
    <main class="login-section">
      <div class="container">
        <div class="login-wrapper">
          <div class="login-left">
            <h1>Welcome Back</h1>
            <p>Login to continue shopping and manage your account.</p>
            <img
              src="../../assets/images/banners/hero-banner.jpg"
              alt="Selina Hero Banner"
            />
          </div>

          <div class="login-right">
            <h2>Login</h2>

            <form id="loginForm" class="login-form">
              <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email" />
              </div>

              <div class="form-group">
                <label for="password">Password</label>
                <input
                  type="password"
                  id="password"
                  placeholder="Enter your password"
                />
              </div>

              <p id="loginMessage" class="login-message"></p>

              <button type="submit" class="btn-login">Login</button>
            </form>

            <div class="login-extra">
              <p>Demo account:</p>
              <span>Email: user@gmail.com</span>
              <span>Password: 123456</span>
            </div>

            <p class="register-link">
              Don’t have an account? <a href="#">Register</a>
            </p>
          </div>
        </div>
      </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
      <div class="container">
        <p>© 2026 Fashion Store. All rights reserved.</p>
      </div>
    </footer>

    <script src="../../assets/js/main.js"></script>
  </body>
</html>
