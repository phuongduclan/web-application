<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Đơn hàng — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/admin.css">
</head>
<body class="trang-don-hang">
  <div id="khung-admin">
    <aside id="thanh-ben">
      <p id="tieu-de-ben">ADMIN</p>
      <nav id="menu-ben" aria-label="Menu chính">
        <a href="dashboard.html" id="muc-tong-quan">Tổng quan</a>
        <a href="products.html" id="muc-san-pham">Sản phẩm</a>
        <a href="categories.html" id="muc-danh-muc">Danh mục</a>
        <a href="orders.html" id="muc-don-hang" class="dang-chon">Đơn hàng</a>
        <a href="users.html" id="muc-nguoi-dung">Người dùng</a>
        <a href="payments.html" id="muc-giao-dich">Giao dịch</a>
      </nav>
    </aside>

    <div id="vung-chinh">
      <header id="dau-trang">
        <h1 id="tieu-de-trang">Quản lý Đơn hàng</h1>
        <div id="khu-chao">
          <span id="loi-chao"></span>
          <button type="button" id="nut-thoat">Đăng xuất</button>
        </div>
      </header>

      <main id="noi-dung">
        <div id="ket-qua">
          <div id="hang-tim-don">
            <form id="bieu-mau-tim" action="#" method="get">
              <input type="search" id="o-tim-don" name="q" placeholder="" autocomplete="off" aria-label="Tìm đơn hàng">
              <button type="submit" id="nut-tim-don">Tìm kiếm</button>
            </form>
          </div>

          <div id="hop-bang-don-chinh">
            <div id="khung-keo-bang-don">
              <table id="bang-don-hang">
                <thead>
                  <tr>
                    <th>Mã hóa đơn</th>
                    <th>Mã khách hàng</th>
                    <th>Địa chỉ</th>
                    <th>Số điện thoại</th>
                    <th>Ghi chú</th>
                    <th>Tổng tiền</th>
                    <th>Trạng thái</th>
                    <th>Thao tác</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>

          <section id="chi-tiet-don" aria-labelledby="tieu-chi-don">
            <h2 id="tieu-chi-don">Chi tiết đơn hàng: <span id="ma-don-chon"></span></h2>
            <div id="hop-bang-ct">
              <div id="khung-keo-ct">
                <table id="bang-ct-don">
                  <thead>
                    <tr>
                      <th>Tên sản phẩm</th>
                      <th>Biến thể</th>
                      <th>Số lượng</th>
                      <th>Đơn giá</th>
                      <th>Thành tiền</th>
                    </tr>
                  </thead>
                  <tbody></tbody>
                </table>
              </div>
              <div id="hang-tong-don">
                <span id="nhan-tong">Tổng cộng:</span>
                <strong id="gia-tri-tong"></strong>
              </div>
            </div>
          </section>
        </div>
      </main>

      <footer id="chan-trang">
        <p id="ban-quyen"></p>
      </footer>
    </div>
  </div>
</body>
</html>
