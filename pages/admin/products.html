<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Sản phẩm — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/admin.css">
</head>
<body class="trang-san-pham">
  <div id="khung-admin">
    <aside id="thanh-ben">
      <p id="tieu-de-ben">ADMIN</p>
      <nav id="menu-ben" aria-label="Menu chính">
        <a href="dashboard.html" id="muc-tong-quan">Tổng quan</a>
        <a href="products.html" id="muc-san-pham" class="dang-chon">Sản phẩm</a>
        <a href="categories.html" id="muc-danh-muc">Danh mục</a>
        <a href="orders.html" id="muc-don-hang">Đơn hàng</a>
        <a href="users.html" id="muc-nguoi-dung">Người dùng</a>
        <a href="payments.html" id="muc-giao-dich">Giao dịch</a>
      </nav>
    </aside>

    <div id="vung-chinh">
      <header id="dau-trang">
        <h1 id="tieu-de-trang">Quản lý Sản phẩm</h1>
        <div id="khu-hanh-dong">
          <button type="button" id="nut-them-sp">Thêm sản phẩm</button>
        </div>
      </header>

      <main id="noi-dung">
        <div id="giao-san-pham">
          <div id="cot-danh-sach">
            <div id="khung-keo-ds">
              <ul id="ds-the-sp"></ul>
            </div>
          </div>

          <div id="cot-chi-tiet">
            <div id="hop-chi-tiet">
              <section id="tt-san-pham" aria-label="Thông tin sản phẩm">
                <div class="dong-tt" id="dong-ma-sp">
                  <span class="nhan-tt">Mã SP:</span>
                  <span class="gia-tri" id="gia-tri-ma"></span>
                </div>
                <div class="dong-tt" id="dong-ten-sp">
                  <span class="nhan-tt">Tên:</span>
                  <span class="gia-tri" id="gia-tri-ten"></span>
                </div>
                <div class="dong-tt" id="dong-danh-muc">
                  <span class="nhan-tt">Danh mục:</span>
                  <span class="gia-tri" id="gia-tri-dm"></span>
                </div>
                <div class="dong-tt" id="dong-mo-ta">
                  <span class="nhan-tt">Mô tả:</span>
                  <span class="gia-tri" id="gia-tri-mt"></span>
                </div>
              </section>

              <section id="khu-bien-the" aria-label="Biến thể">
                <div id="hang-tieu-bien">
                  <h2 id="tieu-ds-bien">Danh sách biến thể</h2>
                  <button type="button" id="nut-them-bien">Thêm biến thể</button>
                </div>
                <div id="khung-bang-bien">
                  <table id="bang-bien-the">
                    <thead>
                      <tr>
                        <th>Kích cỡ</th>
                        <th>Màu sắc</th>
                        <th>Giá</th>
                        <th>Ảnh (URL)</th>
                        <th>Thao tác</th>
                      </tr>
                    </thead>
                    <tbody></tbody>
                  </table>
                </div>
              </section>
            </div>
          </div>
        </div>
      </main>

      <footer id="chan-trang">
        <p id="ban-quyen"></p>
      </footer>
    </div>
  </div>
</body>
</html>
